<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Pulse AI - Institutional Risk & Intelligence Terminal</title>
    
    <!-- Core UI & Library CDNs -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React, ReactDOM, and Babel for JSX compile -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- High-Performance Visualizers: Chart.js & D3.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    
    <!-- Custom CSS styles -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- Custom Tailwind Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#070a13',
                        slateCard: 'rgba(15, 23, 42, 0.45)',
                        borderSlate: 'rgba(255, 255, 255, 0.08)'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#070a13] text-slate-100 min-h-screen flex flex-col">

    <!-- Mounting target for the React Application -->
    <div id="root" class="min-h-screen flex flex-col"></div>

    <!-- Active Ingestion Configurations & React Scripts -->
    <script src="config.js"></script>
    <script type="text/babel" src="app.js"></script>

</body>
</html>
